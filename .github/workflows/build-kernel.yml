name: Build CLKS Kernel

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"

    steps:
      - name: Checkout CLeonOS root
        uses: actions/checkout@v4
        with:
          repository: CLeonOS/cleonos
          path: cleonos
          submodules: recursive

      - name: Use current CLKS checkout
        run: rm -rf cleonos/clks

      - name: Checkout current CLKS
        uses: actions/checkout@v4
        with:
          path: cleonos/clks

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3 \
            tar \
            xorriso \
            mtools \
            autoconf \
            automake \
            libtool \
            pkg-config \
            nasm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate CLKS menuconfig defaults with bdt
        working-directory: cleonos
        run: |
          make menuconfig-clks MENUCONFIG_PRESET=full MENUCONFIG_ARGS="--defaults --non-interactive"

      - name: Build kernel with bdt
        working-directory: cleonos
        run: |
          make kernel-symbols \
            CC=gcc \
            KERNEL_CXX=g++ \
            LD=ld \
            NM=nm \
            JOBS="$(nproc)"

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clks-kernel
          path: |
            cleonos/build/x86_64/clks_kernel.elf
            cleonos/build/x86_64/kernel.sym
          if-no-files-found: error
